name: Build
on:
    push:
        branches: [ main ]
        tags: [ 'v*' ]
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
        -   name: Checkout from GitHub
            uses: actions/checkout@v4

        -   name: Setup Java
            uses: actions/setup-java@v4
            with:
                distribution: "zulu"
                java-version: 21

        -   name: Gradle Build
            run: ./gradlew build

        -   name: Determine Version
            run: echo "VERSION=$(./gradlew properties | awk '/^version:/ { print $2; }')" >> $GITHUB_ENV

        -   name: Release
            if: "${{ startsWith(github.ref, 'refs/tags/v') }}"
            uses: softprops/action-gh-release@v2
            with:
                draft: false
                prerelease: false
                generate_release_notes: true
                files: |
                    platform/bukkit/build/libs/apollo-bukkit-${{ env.VERSION }}.jar
                    platform/bungee/build/libs/apollo-bungee-${{ env.VERSION }}.jar
                    platform/velocity/build/libs/apollo-velocity-${{ env.VERSION }}.jar
                    platform/minestom/build/libs/apollo-minestom-${{ env.VERSION }}.jar
